name: 📬 每周 GitHub Trending 推送

on:
  # 每周一早上 9:00（北京时间）= UTC 01:00
  schedule:
    - cron: "0 1 * * 1"

  # 也可以手动点击触发，方便测试
  workflow_dispatch:

jobs:
  send-trending:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🚀 运行推送脚本
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python github_trending_weekly.py
